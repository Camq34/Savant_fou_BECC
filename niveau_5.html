<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savant Fou - Niveau 5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; background: #000; font-family: Arial, sans-serif; overflow: hidden; }
        #gameContainer { position: relative; width: 100%; height: 100%; }
        #levelTitle { position: absolute; top: 10px; left: 10px; z-index: 50; color: #00ff00; font-weight: bold; text-shadow: 0 0 6px #00ff00; }
        #levelDesc { position: absolute; top: 36px; left: 10px; z-index: 50; color: #00ccff; text-shadow: 0 0 6px #00ccff; }
        #loadingText { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 50; color: #ffff00; }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="levelTitle">Savant Fou</div>
    <div id="levelDesc"></div>
    <div id="loadingText">⏳ Chargement...</div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="levels.js"></script>
    <script src="maps.js"></script>
    <script src="scenes.js"></script>
    <script src="entities.js"></script>
    <script src="gameScene.js"></script>
    <script src="config.js"></script>
    <script>
        function getLevelNumberFromURL() {
            const m = window.location.pathname.match(/niveau_(\d+)/);
            return m ? parseInt(m[1]) : 1;
        }
        const levelNum = getLevelNumberFromURL();
        const mapConfig = getMapConfig(levelNum);
        document.getElementById('levelTitle').textContent = '🎮 SAVANT FOU - Niveau ' + levelNum;
        document.getElementById('levelDesc').textContent = mapConfig ? mapConfig.name : '';
        window.addEventListener('load', () => { document.getElementById('loadingText').style.display = 'none'; });
    </script>
</body>
</html>
