<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savant Fou - Niveau 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .gameInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            font-size: 12px;
        }

        h1 {
            color: #00ff00;
            font-size: 16px;
            margin: 0;
            text-shadow: 0 0 10px #00ff00;
        }

        .subtitle {
            color: #00ccff;
            font-size: 11px;
            margin: 3px 0 0 0;
        }

        #loadingText {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffff00;
            font-size: 13px;
            z-index: 10;
            text-shadow: 0 0 5px #ffff00;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="gameInfo">
            <h1 id="levelTitle">Savant Fou</h1>
            <p class="subtitle" id="levelDesc"></p>
        </div>
        <div id="loadingText">⏳ Chargement...</div>
    </div>

    <!-- Phaser CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Charger les configs -->
    <script src="levels.js"></script>
    <script src="maps.js"></script>

    <!-- Charger les classes Phaser -->
    <script src="config.js"></script>
    <script src="entities.js"></script>
    <script src="scenes.js"></script>
    <script src="gameScene.js"></script>

    <script>
        // Forcer le niveau 1 pour index.html
        if (!window.LEVEL_NUMBER) {
            Object.defineProperty(window, 'LEVEL_NUMBER', {
                get: function() { return 1; }
            });
        }

        // Mettre à jour le titre du niveau
        window.addEventListener('load', () => {
            const levelNum = 1;
            const mapConfig = getMapConfig(levelNum);
            document.getElementById('levelTitle').textContent = '🎮 SAVANT FOU - Niveau ' + levelNum;
            document.getElementById('levelDesc').textContent = mapConfig.name;
        });
    </script>
</body>
</html>
