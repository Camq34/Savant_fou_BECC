<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savant Fou - Niveau 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            text-align: center;
        }

        canvas {
            border: 3px solid #00ff00;
            background-color: #000;
            display: block;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        #ui {
            color: #00ff00;
            margin-top: 20px;
            font-size: 16px;
            background-color: #111;
            padding: 15px;
            border: 2px solid #00ff00;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
        }

        .stat {
            padding: 8px;
        }

        .info {
            grid-column: 1 / -1;
            font-size: 12px;
            color: #888;
        }

        h1 {
            color: #00ff00;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #00ccff;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1 id="levelTitle">Savant Fou</h1>
        <p class="subtitle" id="levelDesc"></p>
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        <div id="ui">
            <div class="stat">❤️ PV: <span id="hp">100</span>/100</div>
            <div class="stat">⚔️ EXP: <span id="exp">0</span></div>
            <div class="stat">💰 SCORE: <span id="score">0</span></div>
            <div class="stat">🌊 VAGUE: <span id="wave">1</span></div>
            <div class="info">Flèches/WASD = Déplacement | Clic/ESPACE = Attaquer</div>
        </div>
    </div>

    <script src="levels.js"></script>
    <script src="game.js"></script>
    <script>
        document.getElementById('levelTitle').textContent = 'Niveau ' + LEVEL_NUMBER + ': ' + LEVEL_CONFIG.name;
        document.getElementById('levelDesc').textContent = LEVEL_CONFIG.description;
    </script>
</body>
</html>
